<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invasión Alienígena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hud">
    <div>Puntuación: <span id="score">0</span></div>
    <div>Vidas: <span id="lives">3</span></div>
    <div class="energy">
        Energía:
        <progress id="energy-bar" value="5" max="5"></progress>
        <span id="energy-text">5/5</span>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="gameOverScreen" class="screen hidden">
    <h1>GAME OVER</h1>
    <p>Puntuación: <span id="finalScore"></span></p>
    <p>Pulsa la tecla ENTER para reiniciar</p>
</div>

<div id="victoryScreen" class="screen hidden">
    <h1>¡VICTORIA!</h1>
    <p>Puntuación: <span id="victoryScore"></span></p>
    <p>Pulsa la tecla ENTER para reiniciar</p>
</div>

<audio id="shootSound" src="https://www.soundjay.com/misc/sounds/laser-1.mp3"></audio>
<audio id="explosionSound" src="https://www.soundjay.com/misc/sounds/explosion-1.mp3"></audio>
<audio id="victorySound" src="https://www.soundjay.com/misc/sounds/victory.mp3"></audio>
<audio id="gameOverSound" src="https://www.soundjay.com/misc/sounds/gameover.mp3"></audio>

<script src="game.js"></script>
</body>
</html>
