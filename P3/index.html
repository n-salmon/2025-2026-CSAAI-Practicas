<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invasión Alienígena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hud">
    <div>Puntuación: <span id="score">0</span></div>
    <div>Vidas: <span id="lives">3</span></div>
    <div class="energy">
        Energía:
        <progress id="energy-bar" value="5" max="5"></progress>
        <span id="energy-text">5/5</span>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="gameOverScreen" class="screen hidden">
    <h1>GAME OVER</h1>
    <p>Puntuación: <span id="finalScore"></span></p>
    <p>Pulsa la tecla ENTER para reiniciar</p>
</div>

<div id="victoryScreen" class="screen hidden">
    <h1>¡VICTORIA!</h1>
    <p>Puntuación: <span id="victoryScore"></span></p>
    <p>Pulsa la tecla ENTER para reiniciar</p>
</div>

    <audio id="shootSound" src="laser.mp3" preload="auto"></audio>
    <audio id="explosionSound" src="explosion.mp3" preload="auto"></audio>
    <audio id="victorySound" src="victoria.mp3" preload="auto"></audio>
    <audio id="gameOverSound" src="game_over.mp3" preload="auto"></audio>

<script src="game.js"></script>
</body>
</html>
