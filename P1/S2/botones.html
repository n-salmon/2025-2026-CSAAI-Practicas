<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej-4: Botón con Imagen</title>
    <style>
        #imagenMostrada {
            display: none;
            max-width: 300px;
            margin-top: 20px;
            border: 2px solid #007bff;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h2><a href="https://n-salmon.github.io/2025-2026-CSAAI-Practicas/P1/S2/">Vuelta al index</a></h2>
    <h2>Botones</h2>
    <button>Botón 1</button>
    <button>Botón 2</button>
    
    <h2>Botón con Imagen</h2>
    
    <!-- Opción 1: Botón HTML con imagen dentro -->
    <button onclick="mostrarImagen()">
        <img src="../../urjc-logo.png" alt="Logo URJC" width="50">
        Pulsar para ver imagen
    </button>
    
    <br>
    <img id="imagenMostrada" src="../../urjc-logo.png" alt="Imagen mostrada">
    
    <script>
        function mostrarImagen() {
            var imagen = document.getElementById('imagenMostrada');
            if (imagen.style.display === 'none') {
                imagen.style.display = 'block';
            } else {
                imagen.style.display = 'none';
            }
        }
    </script>
</body>
</html>
