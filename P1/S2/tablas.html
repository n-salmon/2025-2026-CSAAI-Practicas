<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Delimitar la tabla con la etiqueta <table>. -->
    <table>
        <!-- Cada fila se delimita con <tr></tr> -->
        <tr>
            <!-- Para el encabezado de la tabla se utiliza <th> en lugar de <td>. -->
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Descripcion</th>
        </tr>
        <tr>
            <!-- cada celda con <td>. -->
            <td>Chuck</td>
            <td>Norris</td>
            <td>Creó a Dios</td>
            
        </tr>
        <tr>
            <td>Trollface</td>
            <td>....</td>
            <td>Eres un troll</td>
        </tr>
        <tr>
            <td>Ecce</td>
            <td>Homo</td>
            <td>Genialidad artística</td>
        </tr>
    </table>
</body>
</html>
